<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Донерная Ахмеда 🥙</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ----------------- Стили (оставлены почти без изменений, оптимизированы) ----------------- */
:root {
  --bg: #180d06; --surface: #261408; --surface2: #321b0c; --ember: #ff4d00;
  --saffron: #f5b82e; --gold: #ffe082; --sauce: #c0392b; --green: #7cb342;
  --cream: #fdf3e3; --muted: #9e7a5a; --text: #fdf3e3; --glow-gold: 0 0 20px rgba(245,184,46,0.5);
}
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; min-height:100vh; overflow-x:hidden; user-select:none; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.app { position:relative; z-index:1; max-width:420px; margin:0 auto; }

/* ... здесь вставляем все остальные стили из твоего оригинала ... */

/* Float + Particles */
.float-num { position:fixed; font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--gold); pointer-events:none; z-index:999; text-shadow:0 0 12px rgba(255,200,50,0.8); animation:float-up 0.85s ease forwards; }
.float-num.crit { font-size:30px; color:var(--ember); text-shadow:0 0 16px rgba(255,80,0,0.9); }
@keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-90px) scale(0.6)} }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-doner">🥙</div>
  <div class="loading-text">ДОНЕРНАЯ АХМЕДА</div>
  <div class="loading-sub">Готовим твой прогресс...</div>
</div>

<canvas class="particles-canvas" id="canvas"></canvas>
<div class="app">
  <!-- HEADER, USER ROW, STATS, RANK, CLICKER, TABS -->
  <!-- (оставляем HTML полностью как в твоем коде) -->
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================= TELEGRAM & USER ======================= */
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#180d06'); tg.setBackgroundColor('#180d06'); }

const tgUser = tg?.initDataUnsafe?.user;
const userId = String(tgUser?.id || 'demo_' + Math.random().toString(36).substr(2,6));
const firstName = tgUser?.first_name || 'Гость';
const lastName  = tgUser?.last_name  || '';
const displayName = (firstName + (lastName ? ' ' + lastName : '')).trim();
const tgUsername = tgUser?.username ? '@' + tgUser.username : '';
const photoUrl   = tgUser?.photo_url || null;
const initials = displayName.split(/[\s_]/).map(w=>w[0]||'').join('').toUpperCase().substr(0,2) || '??';

// Заполняем шапку
document.getElementById('display-name').textContent = displayName;
document.getElementById('tg-handle').textContent = tgUsername || 'Telegram пользователь';
const avatarEl = document.getElementById('avatar');
if(photoUrl) avatarEl.innerHTML = `<img src="${photoUrl}" alt="avatar" onerror="this.parentNode.textContent='${initials}'">`;
else avatarEl.textContent = initials;

/* ======================= API HELPERS ======================= */
const API = 'https://doner-ahmed-api.danilruzhitskiy.workers.dev/';

function setSyncStatus(status){
  const dot=document.getElementById('sync-dot');
  const label=document.getElementById('sync-label');
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  label.textContent = status==='syncing'?'Синхронизация...':status==='error'?'Нет связи — сохранено локально':'Облако подключено';
}

async function apiLoad(){ try{ const res=await fetch(`${API}/load?userId=${userId}`); const data=await res.json(); if(data.found) return data.state;}catch(e){} return null; }
async function apiSave(state){ setSyncStatus('syncing'); try{ const res=await fetch(`${API}/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,userName:displayName+' '+tgUsername,state:{...state,level:getLevel()}})}); const data=await res.json(); if(data.ok){ setSyncStatus('ok'); return true; } }catch(e){} setSyncStatus('error'); return false; }
async function apiLeaderboard(){ try{ const res=await fetch(`${API}/leaderboard`); const data=await res.json(); return data.leaderboard||[]; }catch(e){return[];} }

/* ======================= GAME STATE ======================= */
const RANKS=[ { name:'Голодный студент',  min:0, max:1000 }, { name:'Постоянный клиент', min:1000, max:10000 }, { name:'Ценитель специй', min:10000, max:50000 }, { name:'Друг Ахмеда', min:50000, max:200000 }, { name:'Шаурмастер', min:200000, max:1000000 }, { name:'Легенда Донерной', min:1000000, max:5000000 }, { name:'🔥 Сам Ахмед', min:5000000, max:Infinity} ];

const UPGRADES=[ { id:'knife',   name:'Острый нож', icon:'🔪', desc:'Тоньше нарезка — больше лир', baseCost:50, mult:2.2, max:10, effect:'tap', val:1 }, { id:'lavash', name:'Свежий лаваш', icon:'🫓', desc:'Больше аппетита посетителей', baseCost:200, mult:2.5, max:5, effect:'maxEnergy', val:200 }, { id:'grill', id:'🔥', desc:'Мясо готовится быстрее', baseCost:300, mult:3, max:5, effect:'regen', val:0.5 }, { id:'sauce', name:'Чесночный соус', icon:'🧄', desc:'Шанс мега-порции ×5', baseCost:500, mult:2.8, max:5, effect:'crit', val:5 }, { id:'mustafa', name:'Помощник Мустафа', icon:'👨‍🍳', desc:'Авто-нарезка', baseCost:2000, mult:4, max:3, effect:'auto', val:1 }, { id:'double', name:'Двойной донер', icon:'🥙', desc:'Множитель комбо-заказов', baseCost:1500, mult:3.5, max:5, effect:'combo', val:0.2 } ];

function defaultState(){ return { coins:0,totalEarned:0,energy:1000,maxEnergy:1000,regenRate:1,tapPower:1,critChance:0.05,critMult:5,autoLevel:0,comboMult:1,upgrades:{knife:0,lavash:0,grill:0,sauce:0,mustafa:0,double:0},lastSave:Date.now(),lastDaily:0,tasks:{tap500:0,earn10k:0,upgrade3:0} }; }
let state=defaultState();

function getLevel(){ const t=state.totalEarned; if(t<1000)return 1;if(t<5000)return 2;if(t<20000)return 3;if(t<100000)return 4;if(t<500000)return 5;if(t<2000000)return 6; return 7; }
function getRank(){ return RANKS.find(r=>state.totalEarned>=r.min&&state.totalEarned<r.max)||RANKS[RANKS.length-1]; }
function upgCost(cfg,lv){ return Math.floor(cfg.baseCost*Math.pow(cfg.mult,lv)); }
function fmt(n){ if(n>=1e9)return(n/1e9).toFixed(1)+'B'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return Math.floor(n).toString(); }

/* ======================= SAVE / LOAD ======================= */
async function saveState(){ state.lastSave=Date.now(); try{ localStorage.setItem('doner_backup_'+userId,JSON.stringify(state)); }catch(e){} await apiSave(state); }
async function loadState(){ const cloud=await apiLoad(); if(cloud){ state={...defaultState(),...cloud}; return; } try{ const local=localStorage.getItem('doner_backup_'+userId); if(local){ state={...defaultState(),...JSON.parse(local)}; return; } }catch(e){} state=defaultState(); }

/* ======================= TAP & COMBO ======================= */
let comboCount=0, comboTimer=null, lastTapTime=0;
function handleTap(e){
  if(state.energy<=0){ showToast('😤 Посетители наелись! Жди следующих...'); document.getElementById('donerBtn').classList.add('shake'); setTimeout(()=>document.getElementById('donerBtn').classList.remove('shake'),200); return; }
  const now=Date.now(), diff=now-lastTapTime; lastTapTime=now;
  comboCount = diff<600 ? Math.min(comboCount+1,50) : 1;
  clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{ comboCount=0; document.getElementById('combo-display').textContent=''; },1200);

  let earned=state.tapPower, isCrit=false;
  if(Math.random()<state.critChance){ earned*=state.critMult; isCrit=true; }
  if(comboCount>5) earned=Math.floor(earned*(1+(comboCount-5)*state.comboMult*0.1));
  earned=Math.floor(earned);

  state.coins+=earned; state.totalEarned+=earned; state.energy=Math.max(0,state.energy-1);
  state.tasks.tap500=(state.tasks.tap500||0)+1; state.tasks.earn10k=(state.tasks.earn10k||0)+earned;

  const rect=document.getElementById('donerBtn').getBoundingClientRect();
  const x=e.clientX||rect.left+rect.width/2, y=e.clientY||rect.top+rect.height/2;
  spawnFloat(x,y,earned,isCrit);

  isCrit ? tg?.HapticFeedback?.impactOccurred('heavy') : tg?.HapticFeedback?.impactOccurred('light');
  document.getElementById('combo-display').textContent = comboCount>3 ? `КОМБО ×${comboCount}` : '';
  updateUI();
}

/* ======================= FLOAT ======================= */
function spawnFloat(x,y,val,isCrit){
  const el=document.createElement('div');
  el.className='float-num'+(isCrit?' crit':''); el.textContent='+'+fmt(val)+'₺'+(isCrit?' МЕГА-ДОНЕР!':'');
  el.style.left=(x-30+(Math.random()*20-10))+'px'; el.style.top=(y-20)+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),850);
}

/* ======================= TOAST ======================= */
function showToast(text){ const el=document.getElementById('toast'); el.textContent=text; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }

/* ======================= UI UPDATE ======================= */
function updateUI(){
  document.getElementById('coins-display').textContent = fmt(state.coins);
  document.getElementById('total-display').textContent = fmt(state.totalEarned);
  const rank=getRank(); document.getElementById('rank-name').textContent=rank.name;
  const fill=Math.min(100,(state.totalEarned-rank.min)/(rank.max-rank.min)*100); document.getElementById('rank-progress').style.width=fill+'%';
  const hungerFill=document.getElementById('hunger-fill'); hungerFill.style.width=(state.energy/state.maxEnergy*100)+'%';
  document.getElementById('hunger-text').textContent=`${state.energy} / ${state.maxEnergy}`;
}

/* ======================= INIT ======================= */
(async function(){ await loadState(); updateUI(); document.getElementById('loading-screen').classList.add('hidden'); })();
</script>
</body>
</html>
